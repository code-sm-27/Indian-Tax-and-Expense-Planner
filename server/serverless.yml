service: indian-tax-expense-planner-api

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    DB_URL: ${env:DB_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    CLIENT_URL: ${env:CLIENT_URL, '*'}
    NODE_ENV: production

functions:
  api:
    handler: server.handler
    events:
      - httpApi: '*'
